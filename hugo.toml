baseURL = 'https://jacksu.xyz/'
languageCode = 'zh-cn'
title = 'My New Hugo Site'
theme = 'paper'

# 启用 RSS, JSON (搜索索引), Sitemap
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

# 站点地图配置
[sitemap]
  changefreq = "weekly"
  priority = 0.5

[params]
  # Theme options
  color = 'linen' # linen, wheat, gray, light

  # Profile options
  avatar = 'https://picsum.photos/id/1/200/200' # using a placeholder image
  name = 'My Hugo Blog'
  bio = 'Sharing thoughts and code.'

  # Social icons
  github = 'jacksu666'   # Your GitHub username
  # twitter = ''         # Your Twitter username (uncomment if needed)
  rss = true             # 显示 RSS 图标

  # 数学公式支持
  math = true          # 全局启用 KaTeX

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  
  # 文章目录配置
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
  
  # 代码高亮配置
  [markup.highlight]
    style = 'dracula'
    lineNos = false
    noClasses = true
    guessSyntax = true

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 12
  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 14
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 15
  [[menu.main]]
    identifier = "calendar"
    name = "Calendar"
    url = "/calendar/"
    weight = 16
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20
